<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusFM | Status & Player</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(20, 20, 20, 0.7);
            --accent-blue: #0070f3;
            --text-main: #ffffff;
            --text-dim: #888888;
            --success: #00ff88;
            --warning: #f1c40f;
            --error: #ff4d4d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a, #050505);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 28px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
        }

        .logo {
            width: 110px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.05));
        }

        .status-container { margin-bottom: 20px; }
        .status-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 8px;
            display: block;
        }

        .status-value {
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .status-dot { height: 10px; width: 10px; border-radius: 50%; }
        .online .status-dot { background: var(--success); box-shadow: 0 0 12px var(--success); animation: pulse 2s infinite; }
        .wartung .status-dot { background: var(--warning); box-shadow: 0 0 12px var(--warning); }
        .offline .status-dot { background: var(--error); box-shadow: 0 0 12px var(--error); }

        .message {
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.5;
            margin-bottom: 25px;
            min-height: 1.4rem;
        }

        .btn {
            display: block;
            text-decoration: none;
            background: var(--text-main);
            color: black;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
            margin-bottom: 30px;
        }

        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        /* --- MINI PLAYER STYLE --- */
        .player-box {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        #play-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s;
        }

        #play-btn:hover { background: rgba(255, 255, 255, 0.2); }

        .track-info {
            flex: 1;
            text-align: left;
            overflow: hidden;
        }

        .now-playing-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--accent-blue);
            font-weight: bold;
            display: block;
            margin-bottom: 2px;
        }

        #track-name {
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            color: var(--text-main);
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.6; transform: scale(0.95); }
        }
    </style>
</head>
<body>

<div class="glass-card">
    <img src="nexusfm.png" alt="Logo" class="logo">
    
    <div class="status-container">
        <span class="status-label">System Status</span>
        <div id="status-wrapper" class="online">
            <div class="status-value">
                <span class="status-dot"></span>
                <span id="status-text">Prüfe...</span>
            </div>
        </div>
    </div>
    
    <div id="nachricht" class="message"></div>

    <a href="#" id="webseite-link" class="btn">Webseite besuchen</a>

    <div class="player-box">
        <div class="player-controls">
            <button id="play-btn" onclick="togglePlay()">
                <svg id="play-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <div class="track-info">
                <span class="now-playing-label">Live On Air</span>
                <span id="track-name">Lädt Stream Info...</span>
            </div>
        </div>
    </div>
</div>

<audio id="audio-player" src="https://stream.laut.fm/nexusfm-stream"></audio>

<script>
    const audio = document.getElementById('audio-player');
    const playIcon = document.getElementById('play-icon');
    const pauseIcon = document.getElementById('pause-icon');
    const trackName = document.getElementById('track-name');

    // 1. Status Logik (config.json)
    async function updateStatus() {
        try {
            const res = await fetch('config.json?t=' + Date.now());
            const data = await res.json();
            document.getElementById('status-text').innerText = data.status;
            document.getElementById('status-wrapper').className = data.statusClass;
            document.getElementById('nachricht').innerText = data.nachricht || "";
            document.getElementById('webseite-link').href = data.link;
        } catch (e) { console.error("Status Error"); }
    }

    // 2. Player Logik
    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
        } else {
            audio.pause();
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        }
    }

    // 3. Metadata Logik (Was läuft gerade?)
    async function updateMetadata() {
        try {
            // Wir fragen die laut.fm API ab (Slug: nexusfm-stream)
            const res = await fetch('https://api.laut.fm/station/nexusfm-stream/current_song');
            const data = await res.json();
            if (data && data.title) {
                trackName.innerText = `${data.artist.name} - ${data.title}`;
            }
        } catch (e) {
            trackName.innerText = "NexusFM Live Stream";
        }
    }

    // Initialisierung & Intervalle
    updateStatus();
    updateMetadata();
    setInterval(updateMetadata, 20000); // Alle 20 Sek. Song-Titel aktualisieren
    setInterval(updateStatus, 60000);   // Jede Minute Status prüfen
</script>

</body>
</html>
