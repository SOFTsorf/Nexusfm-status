<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusFM Status</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #1a1a1a;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }
        img {
            max-width: 150px;
            margin-bottom: 20px;
        }
        .status-box {
            font-size: 1.2rem;
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
        }
        /* Status-Farben */
        .online { color: #2ecc71; border: 1px solid #2ecc71; }
        .wartung { color: #f1c40f; border: 1px solid #f1c40f; }
        .offline { color: #e74c3c; border: 1px solid #e74c3c; }

        .message {
            color: #ccc;
            font-style: italic;
            margin-bottom: 25px;
            min-height: 1.2rem;
        }
        .btn {
            display: inline-block;
            text-decoration: none;
            background-color: #3498db;
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <img src="nexusfm.png" alt="NexusFM Logo">
    
    <div id="status" class="status-box">Lädt...</div>
    
    <div id="nachricht" class="message"></div>

    <a href="#" id="webseite-link" class="btn">Webseite besuchen</a>
</div>

<script>
    // Funktion zum Laden der Konfiguration
    async function loadStatus() {
        try {
            const response = await fetch('config.json');
            const data = await response.json();

            const statusEl = document.getElementById('status');
            const messageEl = document.getElementById('nachricht');
            const linkEl = document.getElementById('webseite-link');

            // Status setzen
            statusEl.innerText = "Status: " + data.status;
            statusEl.className = "status-box " + data.statusClass;

            // Nachricht setzen (falls vorhanden)
            messageEl.innerText = data.nachricht || "";

            // Link setzen
            linkEl.href = data.link;

        } catch (error) {
            console.error("Fehler beim Laden der Status-Daten:", error);
            document.getElementById('status').innerText = "Status: Unbekannt";
        }
    }

    // Beim Laden der Seite ausführen
    loadStatus();
</script>

</body>
</html>
